<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CTO Executive Portfolio Cockpit</title>
<style>
:root{
  --bg:#f3f6fb; --panel:#ffffff; --panel2:#eef3f9; --text:#172033; --muted:#667085;
  --blue:#165dff; --blue2:#0b46c5; --line:#dfe6ef; --shadow:0 8px 28px rgba(22,45,90,.09);
  --green:#16a34a; --amber:#f59e0b; --red:#dc2626; --purple:#7c3aed; --cyan:#0891b2;
  --sidebar:270px; --radius:14px;
}
body.dark{
  --bg:#0f172a; --panel:#172033; --panel2:#202b40; --text:#ecf2ff; --muted:#9aa8bd;
  --line:#2d3950; --shadow:0 10px 30px rgba(0,0,0,.25); --blue:#4d8dff; --blue2:#7aa7ff;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:Inter,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text)}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
.app{display:grid;grid-template-columns:var(--sidebar) 1fr;min-height:100vh;transition:.2s}
.app.sidebar-collapsed{--sidebar:76px}
.sidebar{position:sticky;top:0;height:100vh;background:#0d2b57;color:white;padding:16px 12px;overflow:auto;z-index:20}
.brand{display:flex;gap:11px;align-items:center;padding:7px 8px 18px}
.logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(145deg,#2f7cff,#62b0ff);display:grid;place-items:center;font-weight:800}
.brand-copy{white-space:nowrap;overflow:hidden}.brand-copy strong{display:block}.brand-copy small{opacity:.75}
.sidebar-collapsed .brand-copy,.sidebar-collapsed .nav-label,.sidebar-collapsed .cat-name,.sidebar-collapsed .sidebar-title,.sidebar-collapsed .cat-actions{display:none}
.nav-btn,.category-row{width:100%;border:0;background:transparent;color:white;display:flex;align-items:center;gap:11px;padding:10px;border-radius:10px;margin:2px 0;text-align:left}
.nav-btn:hover,.nav-btn.active,.category-row:hover{background:rgba(255,255,255,.12)}
.nav-btn .ico,.category-row .ico{width:28px;text-align:center;font-size:18px;flex:none}
.sidebar-title{font-size:11px;text-transform:uppercase;letter-spacing:.13em;opacity:.62;padding:18px 10px 7px}
.category-row{padding:7px 9px}
.cat-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-count{background:rgba(255,255,255,.18);padding:2px 7px;border-radius:999px;font-size:11px}
.cat-actions{display:flex;gap:3px}.cat-actions button{background:transparent;border:0;color:white;opacity:.65;padding:2px}
.main{min-width:0}
.header{position:sticky;top:0;z-index:15;background:color-mix(in srgb,var(--panel) 92%,transparent);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:12px 18px}
.icon-btn,.btn{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:9px;padding:9px 12px}
.icon-btn{width:40px;height:40px;padding:0}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn.danger{color:#fff;background:var(--red);border-color:var(--red)}
.btn.ghost{background:transparent}
.search-wrap{flex:1;position:relative;max-width:720px}.search-wrap input{width:100%;padding:11px 40px;border:1px solid var(--line);border-radius:10px;background:var(--panel);color:var(--text)}
.search-wrap span{position:absolute;left:13px;top:10px}.search-wrap input{padding-left:38px}
.content{padding:20px;max-width:1800px;margin:auto}
.view{display:none}.view.active{display:block}
.page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:16px}.page-head h1{margin:0;font-size:25px}.page-head p{margin:4px 0;color:var(--muted)}
.grid-kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.kpi .value{font-size:27px;font-weight:800;margin-top:6px}.kpi .label{color:var(--muted);font-size:13px}.kpi .trend{font-size:12px;margin-top:7px}
.dashboard-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px;margin-top:14px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);min-width:0}
.card h3{margin:0 0 12px;font-size:16px}.span-4{grid-column:span 4}.span-6{grid-column:span 6}.span-8{grid-column:span 8}.span-12{grid-column:span 12}
canvas{width:100%;height:280px;display:block}
.list{display:flex;flex-direction:column;gap:8px}.list-item{padding:10px;border:1px solid var(--line);border-radius:10px;background:var(--panel2);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}.list-item small{color:var(--muted)}
.alert{border-left:4px solid var(--amber)}.alert.red{border-left-color:var(--red)}
.toolbar{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:12px;margin-bottom:12px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.toolbar select,.toolbar input{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:8px;padding:8px;max-width:180px}
.table-wrap{overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
table{border-collapse:collapse;width:100%;min-width:1700px}th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left;vertical-align:middle;font-size:13px;white-space:nowrap}th{position:sticky;top:0;background:var(--panel2);z-index:2;cursor:pointer}tr:hover td{background:color-mix(in srgb,var(--blue) 5%,var(--panel))}
.title-cell{max-width:300px}.title-line{font-weight:700;overflow:hidden;text-overflow:ellipsis}.desc-line{color:var(--muted);font-size:11px;overflow:hidden;text-overflow:ellipsis;max-width:280px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:999px;font-size:11px;font-weight:700;background:var(--panel2);border:1px solid var(--line)}
.badge.red{color:#fff;background:var(--red);border-color:var(--red)}.badge.amber{color:#111;background:#fbbf24;border-color:#fbbf24}.badge.green{color:#fff;background:var(--green);border-color:var(--green)}
.badge.blue{color:#fff;background:var(--blue);border-color:var(--blue)}.badge.purple{color:#fff;background:var(--purple);border-color:var(--purple)}
.progress{width:100px;height:8px;background:var(--line);border-radius:99px;overflow:hidden}.progress i{display:block;height:100%;background:var(--blue)}
.actions{display:flex;gap:5px}.actions button{border:0;background:var(--panel2);border-radius:7px;padding:6px}
.kanban{display:grid;grid-template-columns:repeat(7,minmax(260px,1fr));gap:12px;overflow:auto;padding-bottom:12px}.kanban-col{background:var(--panel2);border:1px solid var(--line);border-radius:12px;min-height:460px;padding:10px}.kanban-head{font-weight:800;display:flex;justify-content:space-between;margin-bottom:10px}.kanban-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:11px;margin-bottom:8px;box-shadow:0 3px 10px rgba(0,0,0,.06)}.kanban-card h4{margin:0 0 7px;font-size:14px}.kanban-card p{margin:0 0 8px;color:var(--muted);font-size:12px}.kanban-card .meta{display:flex;flex-wrap:wrap;gap:5px}
.timeline{position:relative;padding-left:28px}.timeline:before{content:"";position:absolute;left:11px;top:0;bottom:0;width:2px;background:var(--line)}.time-item{position:relative;margin-bottom:14px}.time-item:before{content:"";position:absolute;left:-22px;top:17px;width:11px;height:11px;border-radius:50%;background:var(--blue);border:3px solid var(--bg)}.time-card{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:13px}
.roadmap{display:grid;grid-template-columns:repeat(4,minmax(270px,1fr));gap:12px;overflow:auto}.quarter{background:var(--panel2);border-radius:12px;padding:12px;min-height:420px}.quarter h3{margin-top:0}.road-item{background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--blue);border-radius:9px;padding:9px;margin:8px 0}
.report-grid{display:grid;grid-template-columns:330px 1fr;gap:14px}.report-output{min-height:550px}.report-output h2{margin-top:0}
.modal{position:fixed;inset:0;background:rgba(7,15,30,.62);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}.modal.open{display:flex}.modal-box{background:var(--panel);width:min(1100px,96vw);max-height:94vh;overflow:auto;border-radius:16px;border:1px solid var(--line);box-shadow:0 20px 70px rgba(0,0,0,.35)}.modal-head{position:sticky;top:0;background:var(--panel);display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid var(--line);z-index:2}.modal-head h2{margin:0}.modal-body{padding:18px}.form-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.field{display:flex;flex-direction:column;gap:5px}.field.span2{grid-column:span 2}.field.span4{grid-column:span 4}.field label{font-size:12px;color:var(--muted);font-weight:700}.field input,.field select,.field textarea{padding:9px;border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:8px}.field textarea{min-height:78px;resize:vertical}.checks{display:flex;gap:18px;padding:8px 0}.modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:14px 18px;border-top:1px solid var(--line)}
.toast-wrap{position:fixed;right:18px;bottom:18px;z-index:200}.toast{background:#13213a;color:white;padding:11px 15px;border-radius:10px;margin-top:8px;box-shadow:var(--shadow)}
.empty{padding:28px;text-align:center;color:var(--muted)}
.dragging{opacity:.45}.drop-target{outline:2px dashed var(--blue)}
@media(max-width:1100px){.span-4,.span-6,.span-8{grid-column:span 12}.form-grid{grid-template-columns:repeat(2,1fr)}.field.span4{grid-column:span 2}.report-grid{grid-template-columns:1fr}}
@media(max-width:760px){.app{grid-template-columns:1fr}.sidebar{position:fixed;left:-285px;width:270px;transition:.2s}.app.mobile-menu .sidebar{left:0}.content{padding:12px}.header{padding:10px}.header .hide-mobile{display:none}.page-head{flex-direction:column}.form-grid{grid-template-columns:1fr}.field.span2,.field.span4{grid-column:span 1}.dashboard-grid{display:block}.dashboard-grid .card{margin-bottom:12px}.grid-kpi{grid-template-columns:repeat(2,1fr)}}
@media print{.sidebar,.header,.toolbar,.page-head .actions-head,.btn,.icon-btn{display:none!important}.app{display:block}.view{display:none!important}.view.active{display:block!important}.content{padding:0}.card,.table-wrap{box-shadow:none;border:1px solid #ccc}body{background:#fff;color:#000}}
</style>
</head>
<body>
<div id="app" class="app">
  <aside class="sidebar">
    <div class="brand"><div class="logo">CTO</div><div class="brand-copy"><strong>Executive Cockpit</strong><small>Technology Portfolio</small></div></div>
    <nav id="mainNav">
      <button class="nav-btn active" data-view="dashboard"><span class="ico">◫</span><span class="nav-label">Dashboard</span></button>
      <button class="nav-btn" data-view="table"><span class="ico">☷</span><span class="nav-label">Vista Tabella</span></button>
      <button class="nav-btn" data-view="kanban"><span class="ico">▦</span><span class="nav-label">Kanban</span></button>
      <button class="nav-btn" data-view="timeline"><span class="ico">◷</span><span class="nav-label">Timeline</span></button>
      <button class="nav-btn" data-view="roadmap"><span class="ico">↗</span><span class="nav-label">Roadmap</span></button>
      <button class="nav-btn" data-view="reports"><span class="ico">▤</span><span class="nav-label">Report</span></button>
    </nav>
    <div class="sidebar-title">Categorie</div>
    <div id="categoryList"></div>
    <button class="nav-btn" id="addCategoryBtn"><span class="ico">＋</span><span class="nav-label">Nuova categoria</span></button>
  </aside>

  <main class="main">
    <header class="header">
      <button class="icon-btn" id="menuBtn" title="Comprimi sidebar">☰</button>
      <div class="search-wrap"><span>⌕</span><input id="globalSearch" placeholder="Ricerca globale... (Ctrl+K)" /></div>
      <button class="icon-btn hide-mobile" id="themeBtn" title="Cambia tema">◐</button>
      <button class="btn hide-mobile" id="backupBtn">Backup</button>
      <button class="btn primary" id="newTaskBtn">＋ Nuova attività</button>
    </header>

    <section class="content">
      <div id="dashboardView" class="view active"></div>
      <div id="tableView" class="view"></div>
      <div id="kanbanView" class="view"></div>
      <div id="timelineView" class="view"></div>
      <div id="roadmapView" class="view"></div>
      <div id="reportsView" class="view"></div>
    </section>
  </main>
</div>

<div class="modal" id="taskModal">
  <div class="modal-box">
    <div class="modal-head"><h2 id="taskModalTitle">Nuova attività</h2><button class="icon-btn" data-close="taskModal">×</button></div>
    <form id="taskForm">
      <div class="modal-body">
        <input type="hidden" name="id">
        <div class="form-grid">
          <div class="field"><label>Categoria</label><select name="category" required></select></div>
          <div class="field span2"><label>Titolo</label><input name="title" required></div>
          <div class="field"><label>Stato</label><select name="status"></select></div>
          <div class="field span4"><label>Descrizione</label><textarea name="description"></textarea></div>
          <div class="field"><label>Owner</label><input name="owner"></div>
          <div class="field"><label>Co-owner</label><input name="coowner"></div>
          <div class="field"><label>Priorità</label><select name="priority"></select></div>
          <div class="field"><label>RAG Status</label><select name="rag"></select></div>
          <div class="field"><label>Due Date</label><input type="date" name="dueDate"></div>
          <div class="field"><label>% completamento</label><input type="number" name="progress" min="0" max="100" value="0"></div>
          <div class="field"><label>Decision Needed</label><select name="decision"><option value="No">No</option><option value="Sì">Sì</option></select></div>
          <div class="field"><label>Tag multipli</label><input name="tags" placeholder="tag1, tag2"></div>
          <div class="field span2"><label>Next Action</label><textarea name="nextAction"></textarea></div>
          <div class="field span2"><label>Aggiornamento</label><textarea name="update"></textarea></div>
          <div class="field span2"><label>Dipendenze</label><textarea name="dependencies"></textarea></div>
          <div class="field span2"><label>Note</label><textarea name="notes"></textarea></div>
          <div class="field span2"><label>Link</label><input type="url" name="link" placeholder="https://..."></div>
          <div class="field span2"><label>Flag</label><div class="checks">
            <label><input type="checkbox" name="urg"> URG</label>
            <label><input type="checkbox" name="mail"> Mail</label>
            <label><input type="checkbox" name="tel"> Tel</label>
          </div></div>
        </div>
      </div>
      <div class="modal-foot"><button type="button" class="btn" data-close="taskModal">Annulla</button><button class="btn primary" type="submit">Salva attività</button></div>
    </form>
  </div>
</div>

<div class="modal" id="categoryModal">
 <div class="modal-box" style="max-width:480px">
  <div class="modal-head"><h2>Categoria</h2><button class="icon-btn" data-close="categoryModal">×</button></div>
  <form id="categoryForm"><div class="modal-body">
   <input type="hidden" name="oldName"><div class="field"><label>Nome categoria</label><input name="name" required maxlength="40"></div>
  </div><div class="modal-foot"><button type="button" class="btn" data-close="categoryModal">Annulla</button><button class="btn primary">Salva</button></div></form>
 </div>
</div>

<input type="file" id="restoreInput" accept=".json" hidden>
<div class="toast-wrap" id="toastWrap"></div>

<script>

========================= */

  rags:['Green','Amber','Red']

const RAW_TASKS = `Infra - Stack

const utils = {
  uid:()=>crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36)+Math.random().toString(36).slice(2),
  today:()=>new Date().toISOString().slice(0,10),
  iso:()=>new Date().toISOString(),
  esc:s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])),
  days:(a,b)=>Math.floor((new Date(a)-new Date(b))/86400000),
  date:s=>s?new Date(s).toLocaleDateString('it-IT'):'—',
  datetime:s=>s?new Date(s).toLocaleString('it-IT'):'—',
  open:t=>!['Completed','Cancelled'].includes(t.status),
  download(name,content,type='text/plain'){
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click();URL.revokeObjectURL(a.href);
  },
  csvCell:v=>`"${String(v??'').replace(/"/g,'""')}"`,
  toast(msg){const e=document.createElement('div');e.className='toast';e.textContent=msg;document.querySelector('#toastWrap').appendChild(e);setTimeout(()=>e.remove(),2600)}
};

/* =========================
   Stato e persistenza
========================= */
const Store = {
  state:null,
  defaults(){return {categories:CONFIG.categories.map((name,i)=>({name,order:i,collapsed:false})),tasks:[],settings:{theme:'light',sidebar:false},timeline:[]}},
  load(){
    try{this.state=JSON.parse(localStorage.getItem(CONFIG.storageKey))||this.defaults()}catch{this.state=this.defaults()}
    this.state.categories ||= this.defaults().categories; this.state.tasks ||= []; this.state.settings ||= {theme:'light',sidebar:false}; this.state.timeline ||= [];
    if(!this.state.tasks.length) this.importSeed();
  },
  save(){localStorage.setItem(CONFIG.storageKey,JSON.stringify(this.state))},
  log(action,task){this.state.timeline.unshift({id:utils.uid(),at:utils.iso(),action,taskId:task?.id,title:task?.title||''});this.state.timeline=this.state.timeline.slice(0,200)},
  importSeed(){
    const known=['Fix BB','Mobile','Infra','EN','CDN','M&E','Compliance','Budget','TV','HR','Corporate','AI','Inno','Revenue','Other','HUB','P-Cloud'];
    const aliases={'BB Fix':'Fix BB','Innov':'Inno','inno':'Inno','compliance':'Compliance'};
    let current='Other';
    RAW_TASKS.split(/\n/).map(x=>x.trim()).filter(Boolean).forEach(line=>{
      let category=null,title=line;
      const match=line.match(/^([^–—-]+?)\s*(?:-|—|\.)(?:\s*)(.+)$/);
      if(match){
        let c=match[1].trim(); c=aliases[c]||c;
        const exact=known.find(k=>k.toLowerCase()===c.toLowerCase());
        if(exact){category=exact;title=match[2].trim()}
      }
      if(!category){
        const exact=known.find(k=>k.toLowerCase()===line.toLowerCase());
        if(exact){current=exact;return}
        category=current;
      } else current=category;
      this.state.tasks.push(this.newTask({category,title}));
    });
    this.log('Importazione iniziale completata',{title:`${this.state.tasks.length} attività`});
    this.save();
  },
  newTask(overrides={}){
    const now=utils.iso();
    return Object.assign({id:utils.uid(),category:'Other',title:'',description:'',owner:'',coowner:'',status:'To Do',priority:'Medium',rag:'Green',dueDate:'',createdAt:now,updatedAt:now,nextAction:'',decision:'No',dependencies:'',tags:[],progress:0,update:'',link:'',notes:'',urg:false,mail:false,tel:false,statusSince:now,completedAt:''},overrides);
  }
};

/* =========================
   Filtri e metriche
========================= */
const Query = {
  filters:{category:'',owner:'',coowner:'',status:'',priority:'',rag:'',urg:'',mail:'',tel:'',decision:'',tag:'',scope:'all'},
  search:'',
  filtered(){
    const q=this.search.trim().toLowerCase(),f=this.filters;
    return Store.state.tasks.filter(t=>{
      const hay=[t.title,t.description,t.owner,t.coowner,t.update,t.nextAction,t.category,(t.tags||[]).join(' ')].join(' ').toLowerCase();
      if(q && !hay.includes(q)) return false;
      for(const k of ['category','owner','coowner','status','priority','rag','decision']) if(f[k] && String(t[k])!==f[k]) return false;
      if(f.tag && !(t.tags||[]).some(x=>x.toLowerCase().includes(f.tag.toLowerCase()))) return false;
      for(const k of ['urg','mail','tel']) if(f[k] && String(!!t[k])!==f[k]) return false;
      if(f.scope==='open'&&!utils.open(t))return false;
      if(f.scope==='completed'&&t.status!=='Completed')return false;
      if(f.scope==='overdue'&&!Metrics.isOverdue(t))return false;
      if(f.scope==='stale'&&!Metrics.isStale(t))return false;
      return true;
    })
  }
};

const Metrics = {
  isOverdue:t=>utils.open(t)&&t.dueDate&&t.dueDate<utils.today(),
  isStale:t=>utils.open(t)&&utils.days(utils.iso(),t.updatedAt)>15,
  waitingOld:t=>t.status==='Waiting'&&utils.days(utils.iso(),t.statusSince||t.updatedAt)>30,
  alerts(t){
    const a=[]; if(this.isStale(t))a.push('Nessun aggiornamento >15gg'); if(!t.owner)a.push('Owner mancante');
    if(this.isOverdue(t))a.push('Due Date superata');if(t.rag==='Red')a.push('RAG Red');if(t.urg)a.push('URG');
    if(this.waitingOld(t))a.push('Waiting >30gg');if(t.decision==='Sì')a.push('Decisione richiesta');if(!t.nextAction)a.push('Next Action mancante');return a;
  },
  summary(tasks=Store.state.tasks){
    const open=tasks.filter(utils.open),completed=tasks.filter(t=>t.status==='Completed');
    return {total:tasks.length,open:open.length,completed:completed.length,overdue:tasks.filter(this.isOverdue).length,urg:tasks.filter(t=>t.urg).length,waiting:tasks.filter(t=>t.status==='Waiting').length,onhold:tasks.filter(t=>t.status==='On Hold').length,escalated:tasks.filter(t=>t.status==='Escalated').length,decision:tasks.filter(t=>t.decision==='Sì').length,red:tasks.filter(t=>t.rag==='Red').length,stale:tasks.filter(this.isStale).length,pct:tasks.length?Math.round(completed.length/tasks.length*100):0}
  },
  group(tasks,key){return tasks.reduce((a,t)=>{const v=t[key]||'Non assegnato';a[v]=(a[v]||0)+1;return a},{})},
  criticalScore(t){
    return (t.priority==='Critical'?40:t.priority==='High'?25:t.priority==='Medium'?10:0)+(t.rag==='Red'?35:t.rag==='Amber'?15:0)+(t.urg?25:0)+(this.isOverdue(t)?25:0)+(t.decision==='Sì'?12:0)+(!t.owner?8:0)+(!t.nextAction?6:0);
  }
};

    if(oldStatus!==t.status)t.statusSince=t.updatedAt;if(t.status==='Completed'&&!t.completedAt)t.completedAt=t.updatedAt;if(t.status!=='Completed')t.completedAt='';

  saveCategory(e){

  },
  deleteCategory(name){
    if(!confirm(`Eliminare la categoria "${name}"? Le attività saranno spostate in Other.`))return;
    Store.state.tasks.filter(t=>t.category===name).forEach(t=>t.category='Other');Store.state.categories=Store.state.categories.filter(c=>c.name!==name);Store.save();this.renderAll();
  }
};

/* =========================
   Azioni attività
========================= */
const Actions = {
  duplicate(id){const t=Store.state.tasks.find(x=>x.id===id);if(!t)return;const n=Store.newTask({...structuredClone(t),id:utils.uid(),title:t.title+' (copia)',createdAt:utils.iso(),updatedAt:utils.iso()});Store.state.tasks.push(n);Store.log('Attività duplicata',n);Store.save();UI.renderAll();utils.toast('Attività duplicata')},
  remove(id){const t=Store.state.tasks.find(x=>x.id===id);if(!t||!confirm(`Eliminare "${t.title}"?`))return;Store.state.tasks=Store.state.tasks.filter(x=>x.id!==id);Store.log('Attività eliminata',t);Store.save();UI.renderAll()},
  changeStatus(id,status){const t=Store.state.tasks.find(x=>x.id===id);if(!t)return;t.status=status;t.statusSince=t.updatedAt=utils.iso();if(status==='Completed'){t.completedAt=t.updatedAt;t.progress=100}else t.completedAt='';Store.log('Stato aggiornato',t);Store.save();UI.renderKanban();UI.renderDashboard()}
};

/* =========================
   Grafici Canvas senza librerie
========================= */
const Charts = {
  setup(id){const c=document.getElementById(id);if(!c)return null;const dpr=devicePixelRatio||1,r=c.getBoundingClientRect();c.width=r.width*dpr;c.height=280*dpr;const x=c.getContext('2d');x.scale(dpr,dpr);return {c,x,w:r.width,h:280}},
  palette:['#165dff','#16a34a','#f59e0b','#dc2626','#7c3aed','#0891b2','#64748b','#ec4899','#84cc16','#f97316','#14b8a6','#8b5cf6'],
  pie(id,data){const s=this.setup(id);if(!s)return;const entries=Object.entries(data).sort((a,b)=>b[1]-a[1]).slice(0,10),sum=entries.reduce((a,b)=>a+b[1],0)||1;let a=-Math.PI/2;entries.forEach(([k,v],i)=>{const z=v/sum*Math.PI*2;s.x.beginPath();s.x.moveTo(105,130);s.x.arc(105,130,85,a,a+z);s.x.fillStyle=this.palette[i%this.palette.length];s.x.fill();a+=z});s.x.font='12px sans-serif';entries.slice(0,8).forEach(([k,v],i)=>{s.x.fillStyle=this.palette[i%this.palette.length];s.x.fillRect(210,25+i*28,12,12);s.x.fillStyle=getComputedStyle(document.body).getPropertyValue('--text');s.x.fillText(`${k} (${v})`,230,36+i*28)})},
  bar(id,data){const s=this.setup(id);if(!s)return;const e=Object.entries(data).sort((a,b)=>b[1]-a[1]).slice(0,9),max=Math.max(...e.map(x=>x[1]),1),bw=Math.max(24,(s.w-40)/e.length-15);s.x.font='11px sans-serif';e.forEach(([k,v],i)=>{const h=v/max*190,x=28+i*((s.w-45)/e.length),y=225-h;s.x.fillStyle=this.palette[i%this.palette.length];s.x.fillRect(x,y,bw,h);s.x.fillStyle=getComputedStyle(document.body).getPropertyValue('--text');s.x.fillText(String(v),x,y-5);s.x.save();s.x.translate(x+8,245);s.x.rotate(-.45);s.x.fillText(k.slice(0,16),0,0);s.x.restore()})}
};

/* =========================
   Report
========================= */
const Reports = {
  period(type){
    const now=new Date(),start=new Date(0);
    if(type==='Settimanale')start.setTime(now.getTime()-7*86400000);
    if(type==='Mensile')start.setTime(now.getTime()-30*86400000);
    if(type==='Trimestrale')start.setTime(now.getTime()-90*86400000);
    if(type==='Annuale')start.setTime(now.getTime()-365*86400000);
    return start;
  },
  render(type){
    const out=document.querySelector('#reportOutput');if(!out)return;let tasks=Query.filtered(),start=this.period(type);
    if(type==='Attività in ritardo')tasks=tasks.filter(Metrics.isOverdue);
    const s=Metrics.summary(tasks),newT=tasks.filter(t=>new Date(t.createdAt)>=start),done=tasks.filter(t=>t.completedAt&&new Date(t.completedAt)>=start),risks=[...tasks].sort((a,b)=>Metrics.criticalScore(b)-Metrics.criticalScore(a)).slice(0,10);
    out.innerHTML=`<h2>Report ${type}</h2><p>Generato il ${new Date().toLocaleString('it-IT')}</p>
      <div class="grid-kpi"><div class="kpi"><div class="label">Totale</div><div class="value">${s.total}</div></div><div class="kpi"><div class="label">Aperte</div><div class="value">${s.open}</div></div><div class="kpi"><div class="label">In ritardo</div><div class="value">${s.overdue}</div></div><div class="kpi"><div class="label">RAG Red</div><div class="value">${s.red}</div></div></div>
      ${type!=='Attività in ritardo'?`<h3>Executive Weekly Review</h3><p><strong>Nuove attività:</strong> ${newT.length} · <strong>Concluse:</strong> ${done.length} · <strong>Decisioni richieste:</strong> ${s.decision} · <strong>Senza Owner:</strong> ${tasks.filter(t=>!t.owner).length} · <strong>Senza aggiornamento:</strong> ${s.stale}</p>`:''}
      <h3>Top 10 rischi</h3><div class="list">${risks.map(t=>UI.taskMini(t,true)).join('')||'<div class="empty">Nessuna attività</div>'}</div>
      <h3>Attività incluse</h3><div class="list">${tasks.slice(0,100).map(t=>UI.taskMini(t)).join('')||'<div class="empty">Nessuna attività</div>'}</div>`;
  }
};

/* =========================
   Esportazione, backup e restore
========================= */
const Export = {
  rows(){return Query.filtered().map(t=>({...t,tags:(t.tags||[]).join('; '),alerts:Metrics.alerts(t).join('; ')}))},
  csv(){
    const r=this.rows(),cols=['category','title','description','owner','coowner','status','priority','rag','dueDate','createdAt','updatedAt','nextAction','decision','dependencies','tags','progress','update','link','notes','urg','mail','tel','alerts'];
    utils.download('cto_portfolio.csv','\ufeff'+[cols.join(','),...r.map(x=>cols.map(c=>utils.csvCell(x[c])).join(','))].join('\n'),'text/csv;charset=utf-8');utils.toast('CSV esportato')
  },
  excel(){
    const r=this.rows(),cols=Object.keys(r[0]||{category:'',title:''});const table=`<table><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr>${r.map(x=>`<tr>${cols.map(c=>`<td>${utils.esc(x[c])}</td>`).join('')}</tr>`).join('')}</table>`;
    utils.download('cto_portfolio.xls',`\ufeff<html><meta charset="utf-8"><body>${table}</body></html>`,'application/vnd.ms-excel');utils.toast('Excel compatibile esportato')
  },
  json(){utils.download('cto_portfolio.json',JSON.stringify(this.rows(),null,2),'application/json')},
  backup(){utils.download(`cto_cockpit_backup_${utils.today()}.json`,JSON.stringify(Store.state,null,2),'application/json');utils.toast('Backup completo creato')},
  restore(file){
    if(!file)return;const fr=new FileReader();fr.onload=()=>{try{const d=JSON.parse(fr.result);if(!d.tasks||!d.categories)throw Error();Store.state=d;Store.save();UI.renderAll();utils.toast('Restore completato')}catch{alert('File di backup non valido')}};fr.readAsText(file)
  }
};

window.UI=UI;window.Actions=Actions;window.Export=Export;window.Reports=Reports;
UI.init();
</script>
