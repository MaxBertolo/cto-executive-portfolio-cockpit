<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CTO Executive Portfolio Cockpit</title>
<style>
:root{--bg:#f3f6fb;--p:#fff;--p2:#eef3f9;--t:#172033;--m:#667085;--l:#dfe6ef;--b:#165dff;--r:#dc2626;--g:#16a34a;--a:#f59e0b;--s:250px}
body.dark{--bg:#0f172a;--p:#172033;--p2:#202b40;--t:#edf2ff;--m:#a7b2c5;--l:#2d3950;--b:#4d8dff}
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--t)}button,input,select,textarea{font:inherit}button{cursor:pointer}
.app{display:grid;grid-template-columns:var(--s) 1fr;min-height:100vh}.app.collapsed{--s:76px}
aside{position:sticky;top:0;height:100vh;overflow:auto;background:#0d2b57;color:#fff;padding:16px 12px}.brand{display:flex;gap:10px;align-items:center;padding:6px 8px 18px}.logo{width:42px;height:42px;border-radius:12px;background:#2f7cff;display:grid;place-items:center;font-weight:800}.brand small{display:block;opacity:.7}
.app.collapsed .brand span,.app.collapsed .cat-name,.app.collapsed .cat-actions,.app.collapsed .side-title{display:none}
.side-title{font-size:11px;text-transform:uppercase;letter-spacing:.12em;opacity:.6;padding:18px 10px 7px}
.cat,.side-btn{width:100%;border:0;background:transparent;color:#fff;display:flex;align-items:center;gap:8px;padding:9px;border-radius:9px;text-align:left}.cat:hover,.side-btn:hover{background:#ffffff1f}.cat-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.count{background:#ffffff24;border-radius:99px;padding:2px 7px;font-size:11px}.cat-actions button{border:0;background:transparent;color:#fff}
main{min-width:0}.header{position:sticky;top:0;z-index:10;display:flex;gap:10px;align-items:center;padding:12px 18px;background:var(--p);border-bottom:1px solid var(--l)}.search{flex:1;max-width:760px}.search input{width:100%;padding:11px;border:1px solid var(--l);border-radius:9px;background:var(--p);color:var(--t)}
.btn,.icon{border:1px solid var(--l);background:var(--p);color:var(--t);border-radius:9px;padding:9px 12px}.icon{width:40px;height:40px;padding:0}.primary{background:var(--b);border-color:var(--b);color:#fff}.danger{background:var(--r);border-color:var(--r);color:#fff}
.content{padding:20px;max-width:1700px;margin:auto}.head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:15px}.head h1{margin:0;font-size:25px}.head p{margin:4px 0;color:var(--m)}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin-bottom:12px}.kpi{background:var(--p);border:1px solid var(--l);border-radius:12px;padding:14px}.kpi span{color:var(--m);font-size:13px}.kpi b{display:block;font-size:26px;margin-top:5px}
.toolbar{display:flex;flex-wrap:wrap;gap:8px;background:var(--p);border:1px solid var(--l);border-radius:12px;padding:11px;margin-bottom:12px}.toolbar select{padding:8px;border:1px solid var(--l);border-radius:8px;background:var(--p);color:var(--t)}
.wrap{overflow:auto;background:var(--p);border:1px solid var(--l);border-radius:12px}table{border-collapse:collapse;width:100%;min-width:1100px}th,td{padding:11px;border-bottom:1px solid var(--l);text-align:left;font-size:13px;vertical-align:middle}th{background:var(--p2);position:sticky;top:0;cursor:pointer;white-space:nowrap}tbody tr{cursor:pointer}tbody tr:hover td{background:color-mix(in srgb,var(--b) 5%,var(--p))}
.badge{display:inline-block;padding:4px 8px;border-radius:99px;background:var(--p2);border:1px solid var(--l);font-size:11px;font-weight:700}.blue{background:var(--b);border-color:var(--b);color:#fff}.green{background:var(--g);border-color:var(--g);color:#fff}.amber{background:#fbbf24;border-color:#fbbf24;color:#111}.red{background:var(--r);border-color:var(--r);color:#fff}.flags{display:flex;gap:5px;flex-wrap:wrap}.flag{padding:4px 7px;border-radius:8px;background:var(--p2);border:1px solid var(--l)}.desc{max-width:320px;white-space:normal;line-height:1.35}.late{color:var(--r);font-weight:800}
.modal{position:fixed;inset:0;background:#07101ea8;display:none;align-items:center;justify-content:center;z-index:100;padding:18px}.modal.open{display:flex}.box{width:min(800px,96vw);max-height:94vh;overflow:auto;background:var(--p);border-radius:15px}.mh,.mf{display:flex;align-items:center;padding:15px 18px;border-bottom:1px solid var(--l)}.mh{justify-content:space-between}.mf{justify-content:flex-end;gap:8px;border-top:1px solid var(--l);border-bottom:0}.mb{padding:18px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}.field{display:flex;flex-direction:column;gap:5px}.full{grid-column:1/-1}.field label{font-size:12px;color:var(--m);font-weight:700}.field input,.field select,.field textarea{padding:10px;border:1px solid var(--l);border-radius:8px;background:var(--p);color:var(--t)}textarea{min-height:120px;resize:vertical}.checks{display:flex;gap:22px;padding:8px 0}
#gate{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#081a35,#0d2b57)}.login{background:#fff;color:#172033;width:min(390px,90vw);padding:35px;border-radius:17px;text-align:center}.login input,.login button{width:100%;padding:13px;margin-top:12px;border-radius:9px}.login input{border:1px solid #ddd}.login button{border:0;background:#165dff;color:#fff;font-weight:800}#err{display:none;color:#d00;margin-top:10px}
.toast{position:fixed;right:18px;bottom:18px;background:#13213a;color:#fff;padding:11px 15px;border-radius:9px}
@media(max-width:760px){.app{grid-template-columns:1fr}aside{position:fixed;left:-270px;width:250px;z-index:20;transition:.2s}.app.menu aside{left:0}.content{padding:12px}.hide{display:none}.head{flex-direction:column}.grid{grid-template-columns:1fr}.full{grid-column:auto}}
</style>
</head>
<body>
<div id="gate"><div class="login"><h2>CTO Executive Cockpit</h2><p>Inserisci la password</p><input id="pwd" type="password" placeholder="Password"><button id="login">Accedi</button><div id="err">Password non corretta</div></div></div>

<div id="app" class="app">
<aside>
  <div class="brand"><div class="logo">CTO</div><span><b>Executive Cockpit</b><small>Technology Portfolio</small></span></div>
  <button class="side-btn"><span>☷</span><span class="cat-name">Dashboard</span></button>
  <div class="side-title">Categorie</div><div id="cats"></div>
  <button class="side-btn" id="newCat"><span>＋</span><span class="cat-name">Nuova categoria</span></button>
</aside>
<main>
  <div class="header">
    <button class="icon" id="menu">☰</button>
    <div class="search"><input id="search" placeholder="Ricerca per attività, owner, descrizione o categoria..."></div>
    <button class="icon hide" id="theme">◐</button>
    <button class="btn hide" id="backup">Backup</button>
    <button class="btn primary" id="newTask">＋ Nuova attività</button>
  </div>
  <div class="content">
    <div class="head"><div><h1>Portfolio Dashboard</h1><p>Clicca su una riga o su Modifica per aprire l’attività.</p></div><div><button class="btn" id="csv">CSV</button> <button class="btn" onclick="print()">PDF</button></div></div>
    <div class="kpis" id="kpis"></div>
    <div id="filters"></div>
    <div id="table"></div>
  </div>
</main>
</div>

<div class="modal" id="taskModal"><div class="box">
  <div class="mh"><h2 id="taskTitle">Attività</h2><button class="icon" data-close="taskModal">×</button></div>
  <form id="taskForm"><div class="mb"><input type="hidden" name="id"><div class="grid">
    <div class="field"><label>Categoria</label><select name="category"></select></div>
    <div class="field"><label>Stato</label><select name="status"></select></div>
    <div class="field full"><label>Attività</label><input name="title" required></div>
    <div class="field"><label>Owner</label><input name="owner"></div>
    <div class="field"><label>Due Date</label><input type="date" name="dueDate"></div>
    <div class="field full"><label>Descrizione</label><textarea name="description"></textarea></div>
    <div class="field full"><label>Flag</label><div class="checks"><label><input type="checkbox" name="mail"> ✉ Mail</label><label><input type="checkbox" name="tel"> ☎ Telefonata</label></div></div>
  </div></div><div class="mf"><button type="button" class="btn danger" id="del" style="margin-right:auto">Elimina</button><button type="button" class="btn" data-close="taskModal">Annulla</button><button class="btn primary">Salva</button></div></form>
</div></div>

<div class="modal" id="catModal"><div class="box" style="max-width:480px">
  <div class="mh"><h2>Categoria</h2><button class="icon" data-close="catModal">×</button></div>
  <form id="catForm"><div class="mb"><input type="hidden" name="old"><div class="field"><label>Nome categoria</label><input name="name" required></div></div><div class="mf"><button type="button" class="btn" data-close="catModal">Annulla</button><button class="btn primary">Salva</button></div></form>
</div></div>
<div id="toast"></div>

<script>
const C={key:'ctoExecutivePortfolioCockpit.v1',pwd:'2013!',cats:['Fix BB','Mobile','Infra','EN','CDN','M&E','Compliance','Budget','TV','HR','Corporate','AI','Inno','Revenue','Other','HUB','P-Cloud'],st:['To Do','Planned','In Progress','Waiting','On Hold','Escalated','Completed','Cancelled']};
const u={id:()=>crypto.randomUUID?crypto.randomUUID():Date.now().toString(36)+Math.random().toString(36).slice(2),iso:()=>new Date().toISOString(),today:()=>new Date().toISOString().slice(0,10),esc:s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])),date:s=>s?new Date(s+'T00:00:00').toLocaleDateString('it-IT'):'—',open:t=>!['Completed','Cancelled'].includes(t.status),late:t=>u.open(t)&&t.dueDate&&t.dueDate<u.today(),toast:s=>{let e=document.createElement('div');e.className='toast';e.textContent=s;document.body.appendChild(e);setTimeout(()=>e.remove(),2200)},dl:(n,c,t)=>{let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:t}));a.download=n;a.click();URL.revokeObjectURL(a.href)}};
const S={d:null,def(){return{categories:C.cats.map((name,order)=>({name,order})),tasks:[],settings:{theme:'light',sidebar:false}}},load(){try{this.d=JSON.parse(localStorage.getItem(C.key))||this.def()}catch{this.d=this.def()}this.d.categories||=this.def().categories;this.d.tasks||=[];this.d.settings||={theme:'light',sidebar:false};this.d.tasks.forEach(t=>{t.id||=u.id();t.category||='Other';t.title||='';t.owner||='';t.status||='To Do';t.description||='';t.dueDate||='';t.mail=!!t.mail;t.tel=!!t.tel;t.createdAt||=u.iso();t.updatedAt||=t.createdAt});this.save()},save(){localStorage.setItem(C.key,JSON.stringify(this.d))},new(o={}){let n=u.iso();return Object.assign({id:u.id(),category:'Other',title:'',owner:'',status:'To Do',description:'',dueDate:'',mail:false,tel:false,createdAt:n,updatedAt:n},o)}};
const Q={q:'',f:{category:'',owner:'',status:'',mail:'',tel:'',scope:'all'},get(){let q=this.q.toLowerCase(),f=this.f;return S.d.tasks.filter(t=>{let h=[t.category,t.title,t.owner,t.status,t.description].join(' ').toLowerCase();return(!q||h.includes(q))&&(!f.category||t.category===f.category)&&(!f.owner||t.owner===f.owner)&&(!f.status||t.status===f.status)&&(!f.mail||String(!!t.mail)===f.mail)&&(!f.tel||String(!!t.tel)===f.tel)&&!(f.scope==='open'&&!u.open(t))&&!(f.scope==='completed'&&t.status!=='Completed')&&!(f.scope==='overdue'&&!u.late(t))})}};
const UI={id:null,sort:{k:'updatedAt',d:-1},init(){S.load();document.body.classList.toggle('dark',S.d.settings.theme==='dark');document.querySelector('#app').classList.toggle('collapsed',S.d.settings.sidebar);this.bind();this.render()},bind(){newTask.onclick=()=>this.open();newCat.onclick=()=>this.openCat();menu.onclick=()=>innerWidth<760?app.classList.toggle('menu'):(S.d.settings.sidebar=!S.d.settings.sidebar,S.save(),app.classList.toggle('collapsed'));theme.onclick=()=>{S.d.settings.theme=document.body.classList.toggle('dark')?'dark':'light';S.save()};search.oninput=e=>{Q.q=e.target.value;this.render()};taskForm.onsubmit=e=>this.saveTask(e);catForm.onsubmit=e=>this.saveCat(e);del.onclick=()=>this.remove();backup.onclick=()=>EX.backup();csv.onclick=()=>EX.csv();document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>document.querySelector('#'+b.dataset.close).classList.remove('open'))},render(){this.cats();this.kpis();this.filters();this.table()},cats(){let c=S.d.tasks.reduce((a,t)=>(a[t.category]=(a[t.category]||0)+1,a),{});cats.innerHTML=S.d.categories.sort((a,b)=>a.order-b.order).map(x=>`<div class="cat" data-c="${u.esc(x.name)}"><span>▹</span><span class="cat-name">${u.esc(x.name)}</span><span class="count">${c[x.name]||0}</span><span class="cat-actions"><button data-e="${u.esc(x.name)}">✎</button><button data-x="${u.esc(x.name)}">×</button></span></div>`).join('');cats.querySelectorAll('.cat').forEach(r=>r.onclick=e=>{if(e.target.closest('button'))return;Q.f.category=r.dataset.c;this.render();app.classList.remove('menu')});cats.querySelectorAll('[data-e]').forEach(b=>b.onclick=()=>this.openCat(b.dataset.e));cats.querySelectorAll('[data-x]').forEach(b=>b.onclick=()=>this.delCat(b.dataset.x))},kpis(){let t=Q.get(),m=[['Totale',t.length],['Aperte',t.filter(u.open).length],['Completate',t.filter(x=>x.status==='Completed').length],['In ritardo',t.filter(u.late).length],['Mail',t.filter(x=>x.mail).length],['Telefonate',t.filter(x=>x.tel).length],['Senza Owner',t.filter(x=>!x.owner).length]];kpis.innerHTML=m.map(x=>`<div class="kpi"><span>${x[0]}</span><b>${x[1]}</b></div>`).join('')},opts(a,v){return'<option value="">Tutti</option>'+[...new Set(a.filter(Boolean))].sort().map(x=>`<option ${x===v?'selected':''}>${u.esc(x)}</option>`).join('')},filters(){filters.innerHTML=`<div class="toolbar" id="fb"><select data-f="category">${this.opts(S.d.categories.map(x=>x.name),Q.f.category)}</select><select data-f="owner">${this.opts(S.d.tasks.map(x=>x.owner),Q.f.owner)}</select><select data-f="status">${this.opts(C.st,Q.f.status)}</select><select data-f="mail"><option value="">Mail: tutte</option><option value="true" ${Q.f.mail==='true'?'selected':''}>Sì</option><option value="false" ${Q.f.mail==='false'?'selected':''}>No</option></select><select data-f="tel"><option value="">Telefonata: tutte</option><option value="true" ${Q.f.tel==='true'?'selected':''}>Sì</option><option value="false" ${Q.f.tel==='false'?'selected':''}>No</option></select><select data-f="scope"><option value="all">Tutte</option><option value="open" ${Q.f.scope==='open'?'selected':''}>Solo aperte</option><option value="completed" ${Q.f.scope==='completed'?'selected':''}>Completate</option><option value="overdue" ${Q.f.scope==='overdue'?'selected':''}>In ritardo</option></select><button class="btn" id="reset">Reset</button></div>`;document.querySelectorAll('#fb [data-f]').forEach(e=>e.onchange=()=>{Q.f[e.dataset.f]=e.value;this.render()});reset.onclick=()=>{Q.f={category:'',owner:'',status:'',mail:'',tel:'',scope:'all'};this.render()}},table(){let t=Q.get(),s=this.sort;t.sort((a,b)=>String(a[s.k]??'').localeCompare(String(b[s.k]??''),'it',{numeric:true})*s.d);let cols=[['category','Categoria'],['title','Attività'],['owner','Owner'],['status','Stato'],['description','Descrizione'],['dueDate','Due Date'],['flags','Flag'],['actions','Azioni']];table.innerHTML=`<div class="wrap"><table><thead><tr>${cols.map(c=>`<th data-s="${c[0]}">${c[1]} ${s.k===c[0]?(s.d===1?'▲':'▼'):''}</th>`).join('')}</tr></thead><tbody>${t.length?t.map(x=>`<tr onclick="UI.open('${x.id}')"><td><span class="badge blue">${u.esc(x.category)}</span></td><td><b>${u.esc(x.title)}</b></td><td>${u.esc(x.owner||'—')}</td><td><span class="badge ${x.status==='Completed'?'green':x.status==='Escalated'?'red':x.status==='Waiting'?'amber':''}">${u.esc(x.status)}</span></td><td class="desc">${u.esc(x.description||'—')}</td><td class="${u.late(x)?'late':''}">${u.date(x.dueDate)}</td><td><div class="flags">${x.mail?'<span class="flag">✉ Mail</span>':''}${x.tel?'<span class="flag">☎ Telefonata</span>':''}${!x.mail&&!x.tel?'—':''}</div></td><td><button class="btn" onclick="event.stopPropagation();UI.open('${x.id}')">✎ Modifica</button></td></tr>`).join(''):'<tr><td colspan="8" style="text-align:center;padding:30px">Nessuna attività</td></tr>'}</tbody></table></div>`;document.querySelectorAll('th[data-s]').forEach(h=>h.onclick=()=>{if(['flags','actions'].includes(h.dataset.s))return;this.sort.d=this.sort.k===h.dataset.s?-this.sort.d:1;this.sort.k=h.dataset.s;this.table()})},open(id=''){this.id=id||null;let t=id?S.d.tasks.find(x=>x.id===id):S.new({category:Q.f.category||'Other'}),f=taskForm;f.reset();taskTitle.textContent=id?'Modifica attività':'Nuova attività';f.elements.category.innerHTML=S.d.categories.sort((a,b)=>a.order-b.order).map(x=>`<option>${u.esc(x.name)}</option>`).join('');f.elements.status.innerHTML=C.st.map(x=>`<option>${x}</option>`).join('');f.elements.id.value=id||'';['category','title','owner','status','description','dueDate'].forEach(k=>f.elements[k].value=t[k]||'');f.elements.mail.checked=!!t.mail;f.elements.tel.checked=!!t.tel;del.style.display=id?'inline-block':'none';taskModal.classList.add('open')},saveTask(e){e.preventDefault();let f=e.target,d=new FormData(f),id=(d.get('id')||'').trim(),t=id?S.d.tasks.find(x=>x.id===id):null;if(!t){t=S.new();S.d.tasks.push(t)}['category','title','owner','status','description','dueDate'].forEach(k=>t[k]=d.get(k)||'');t.mail=d.has('mail');t.tel=d.has('tel');t.updatedAt=u.iso();S.save();taskModal.classList.remove('open');this.id=null;this.render();u.toast(id?'Attività aggiornata':'Nuova attività aggiunta')},remove(){if(!this.id)return;let t=S.d.tasks.find(x=>x.id===this.id);if(!confirm(`Eliminare "${t.title}"?`))return;S.d.tasks=S.d.tasks.filter(x=>x.id!==this.id);S.save();taskModal.classList.remove('open');this.render()},openCat(n=''){catForm.reset();catForm.old.value=n;catForm.name.value=n;catModal.classList.add('open')},saveCat(e){e.preventDefault();let o=e.target.old.value,n=e.target.name.value.trim();if(!n)return;if(S.d.categories.some(x=>x.name.toLowerCase()===n.toLowerCase()&&x.name!==o))return alert('Categoria già esistente');if(o){S.d.categories.find(x=>x.name===o).name=n;S.d.tasks.filter(x=>x.category===o).forEach(x=>x.category=n)}else S.d.categories.push({name:n,order:S.d.categories.length});S.save();catModal.classList.remove('open');this.render()},delCat(n){if(n==='Other')return alert('Other non può essere eliminata');if(!confirm(`Eliminare "${n}"?`))return;S.d.tasks.filter(x=>x.category===n).forEach(x=>x.category='Other');S.d.categories=S.d.categories.filter(x=>x.name!==n);S.save();this.render()}};
const EX={csv(){let r=Q.get(),c=['category','title','owner','status','description','dueDate','mail','tel'],q=v=>`"${String(v??'').replace(/"/g,'""')}"`;u.dl('cto_portfolio.csv','\ufeff'+[c.join(','),...r.map(x=>c.map(k=>q(x[k])).join(','))].join('\n'),'text/csv;charset=utf-8')},backup(){u.dl(`cto_cockpit_backup_${u.today()}.json`,JSON.stringify(S.d,null,2),'application/json')}};
window.UI=UI;UI.init();
function unlock(){if(pwd.value===C.pwd){sessionStorage.setItem('ctoAuth','1');gate.style.display='none';err.style.display='none'}else{err.style.display='block';pwd.value='';pwd.focus()}}
login.onclick=unlock;pwd.onkeydown=e=>{if(e.key==='Enter')unlock()};if(sessionStorage.getItem('ctoAuth')==='1')gate.style.display='none';
</script>
</body></html>
